<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Capturador multimedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        <h1>Capturador multimedia</h1>
      </div>
      <div class="status-indicator" id="status-indicator">Pestaña activa</div>
    </header>

    <main class="app-body">
      <section class="download-config-panel">
        <label for="download-dir">Carpeta de Descarga:</label>
        <div class="input-with-button">
          <input type="text" id="download-dir" placeholder="Ej: C:\Descargas\Videos">
          <button id="btn-browse-folder" class="btn-secondary">Examinar...</button>
        </div>
        <div style="margin-top: 6px; display: flex; align-items: center; gap: 4px;">
          <input type="checkbox" id="download-subs-only" style="width: 11px; height: 11px; accent-color: #3b82f6; cursor: pointer;">
          <label for="download-subs-only" style="font-size: 11px; color: var(--text-muted); cursor: pointer;">Descargar sólo subtítulos (si existen)</label>
        </div>
      </section>

      <!-- Panel de instrucciones/estado -->
      <div class="instruction-text" id="instruction-display" style="padding: 0 4px; font-size: 12px; color: var(--text-muted);">
        Presiona el botón para escanear la pestaña activa en busca de vídeos.
      </div>

      <!-- Panel de acciones básicas -->
      <section class="actions-panel" style="display: flex; gap: 10px;">
        <button id="btn-vimeo" class="btn-primary" style="display: none;">Buscar Vimeo</button>
        <button id="btn-video" class="btn-primary" style="display: none;">Buscar Vídeo</button>
        <button id="btn-youtube" class="btn-primary" style="display: none;">YOU</button>
        <button id="btn-audio" class="btn-primary" style="display: none;">Buscar Audio</button>
        <button id="btn-zip" class="btn-primary" style="display: none;">Buscar Zip/Otros</button>

        <button id="btn-clear-clipboard" class="btn-secondary" title="Borrar portapapeles" style="padding: 10px 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #334155; border: 1px solid #475569; border-radius: 8px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </button>
        <button id="btn-todo" class="btn-primary" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); flex-grow: 1;">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"></polyline>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          ANALIZAR
        </button>
      </section>

      <!-- Panel de resultados y listado de enlaces con checkbox -->
      <section class="results-panel">
        <div class="results-header">
          <div class="results-title-area">
            <input type="checkbox" id="select-all" disabled>
            <label for="select-all"><strong>Todos</strong></label>
          </div>
          <div class="results-controls">
            <button id="btn-copy-all" class="btn-secondary" style="display: none;">Copiar Todo (TSV)</button>
            <span class="badge" id="results-count">0</span>
          </div>
        </div>
        
        <div class="results-list-container">
          <ul id="results-list" class="results-list">
            <li class="empty-state">No se han realizado búsquedas aún.</li>
          </ul>
        </div>
      </section>

      <!-- Panel de descarga (yt-dlp) y progreso en tiempo real -->
      <section class="download-execution-panel">
        <div class="download-row">
          <button id="btn-start-download" class="btn-download" disabled>
            Comenzar Descarga
          </button>
          <button id="btn-open-folder" class="btn-open-folder" title="Abrir carpeta de descargas">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </div>

        <div id="progress-container" class="progress-container" style="display: none;">
          <div class="progress-header">
            <span id="progress-status">Descargando...</span>
            <span id="progress-percentage">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
          </div>
          <div class="progress-details">
            <span id="progress-speed">Velocidad: --</span>
            <span id="progress-eta">ETA: --</span>
          </div>
          <button id="btn-cancel-download" class="btn-cancel">Cancelar Descarga</button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>Extensión de captura V3 + yt-dlp</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
