<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Capturador de Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        <h1>Capturador</h1>
      </div>
      <div class="status-indicator" id="status-indicator">Pestaña activa</div>
    </header>

    <main class="app-body">
      <section class="download-config-panel">
        <label for="download-dir">Carpeta de Descarga:</label>
        <div class="input-with-button">
          <input type="text" id="download-dir" placeholder="Ej: C:\Descargas\Videos">
          <button id="btn-browse-folder" class="btn-secondary">Examinar...</button>
        </div>
      </section>

      <!-- Panel de instrucciones/estado -->
      <div class="instruction-text" id="instruction-display" style="padding: 0 4px; font-size: 12px; color: var(--text-muted);">
        Presiona el botón para escanear la pestaña activa en busca de vídeos.
      </div>

      <!-- Panel de acciones básicas -->
      <section class="actions-panel">
        <button id="btn-vimeo" class="btn-primary">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          Buscar Vimeo
        </button>
        <button id="btn-video" class="btn-primary" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
            <line x1="7" y1="2" x2="7" y2="22"></line>
            <line x1="17" y1="2" x2="17" y2="22"></line>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <line x1="2" y1="7" x2="7" y2="7"></line>
            <line x1="2" y1="17" x2="7" y2="17"></line>
            <line x1="17" y1="17" x2="22" y2="17"></line>
            <line x1="17" y1="7" x2="22" y2="7"></line>
          </svg>
          Buscar Vídeo
        </button>
        <button id="btn-youtube" class="btn-primary" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"></path>
            <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
          </svg>
          YOU
        </button>
        <button id="btn-audio" class="btn-primary" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
          Buscar Audio
        </button>
        <button id="btn-zip" class="btn-primary" style="background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          Buscar Zip/Otros
        </button>
        <button id="btn-todo" class="btn-primary" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"></polyline>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          TODO
        </button>
      </section>

      <!-- Panel de resultados y listado de enlaces con checkbox -->
      <section class="results-panel">
        <div class="results-header">
          <div class="results-title-area">
            <input type="checkbox" id="select-all" disabled>
            <label for="select-all"><strong>Todos</strong></label>
          </div>
          <div class="results-controls">
            <button id="btn-copy-all" class="btn-secondary" style="display: none;">Copiar Todo (TSV)</button>
            <span class="badge" id="results-count">0</span>
          </div>
        </div>
        
        <div class="results-list-container">
          <ul id="results-list" class="results-list">
            <li class="empty-state">No se han realizado búsquedas aún.</li>
          </ul>
        </div>
      </section>

      <!-- Panel de descarga (yt-dlp) y progreso en tiempo real -->
      <section class="download-execution-panel">
        <div class="download-row">
          <button id="btn-start-download" class="btn-download" disabled>
            Comenzar Descarga
          </button>
          <button id="btn-open-folder" class="btn-open-folder" title="Abrir carpeta de descargas">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </div>

        <div id="progress-container" class="progress-container" style="display: none;">
          <div class="progress-header">
            <span id="progress-status">Descargando...</span>
            <span id="progress-percentage">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
          </div>
          <div class="progress-details">
            <span id="progress-speed">Velocidad: --</span>
            <span id="progress-eta">ETA: --</span>
          </div>
          <button id="btn-cancel-download" class="btn-cancel">Cancelar Descarga</button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>Extensión de captura V3 + yt-dlp</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
